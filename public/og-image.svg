        stroke-linejoin="round"/>

  <!-- Text -->
  <text x="600" y="500" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">
    Easy Insurance
  </text>
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="28" fill="white" opacity="0.9" text-anchor="middle">
